<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prueba2-Ingrid-Lizeth-Sequeira-Blandon</title>
 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    
    #rojo    { background-color: #e00000; min-height: 70px; }
    #turquesa { background-color: #00BFFF; min-height: 45px; }
    #amarillo { background-color: #FFD700; min-height: 200px; }
    .verde   { background-color: #228B22; min-height: 200px; }
    .morado  { background-color: #8B008B; min-height: 90px; }
    #rosado  { background-color: #FFB6C1; min-height: 50px; }

    
    .tarjeta-morada {
      background-color: #9b59b6;
      border: 2px solid #6c3483;
      border-radius: 8px;
      color: #fff;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.9rem;
    }

   
    #formulario-aside {
      padding: 16px;
    }
    #formulario-aside h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 14px;
    }
    #resultado-area {
      display: none;
      margin-top: 12px;
      background: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      text-align: center;
    }
    #resultado-area p { margin-bottom: 4px; font-size: 0.85rem; color: #555; }
    #resultado-area h3 { color: #228B22; font-size: 1.4rem; font-weight: 700; }

   
    #tabla-evaluacion thead th { background-color: #00BFFF; color: #fff; }
    #tabla-evaluacion .criterio-header { background-color: #87CEEB; }

    
    .min-h-full { min-height: 100%; }
    body { background: #f4f4f4; }
  </style>
</head>
<body>

<div class="container-fluid px-2 py-3">

 
  <div class="row g-2 mb-2">
    <div class="col-12">
      <header id="rojo" class="d-flex align-items-center justify-content-center rounded">
        <span class="text-white fw-bold fs-4">Manzana</span>
      </header>
    </div>
  </div>


  <div class="row g-2 mb-2">


    <div class="col-12 col-sm-12 col-md-2">
      <nav id="turquesa" class="rounded d-flex align-items-center justify-content-center h-100">
        <span class="text-white fw-bold">Espacio del Nav</span>
      </nav>
    </div>

 
    <div class="col-12 col-sm-12 col-md-10">
      <article class="verde rounded d-flex align-items-center justify-content-center h-100">
        <span class="text-white fw-bold fs-5">Espacio del Article</span>
      </article>
    </div>
  </div>


  <div class="row g-2 mb-2">

   
    <div class="col-12 col-md-2">
      <aside id="amarillo" class="rounded p-1 h-100">
        <div id="formulario-aside">
          <h2 class="text-center">Área de un Anillo Circular</h2>

          <div class="mb-2">
            <label for="radioMayor" class="form-label fw-semibold" style="font-size:0.85rem;">Radio Mayor (R)</label>
            <input type="number" class="form-control form-control-sm" id="radioMayor" placeholder="Ej: 10" />
            <div class="invalid-feedback">Ingrese un número válido para R.</div>
          </div>

          <div class="mb-2">
            <label for="radioMenor" class="form-label fw-semibold" style="font-size:0.85rem;">Radio Menor (r)</label>
            <input type="number" class="form-control form-control-sm" id="radioMenor" placeholder="Ej: 5" />
            <div class="invalid-feedback">Ingrese un número válido para r.</div>
          </div>

          <button class="btn btn-success btn-sm w-100" onclick="calcularArea()">Calcular Área</button>

          <div id="resultado-area">
            <p>El área resultante es:</p>
            <h3 id="valorArea">-- u²</h3>
          </div>
        </div>
      </aside>
    </div>

   
    <div class="col-12 col-md-10">
      
      <div class="row g-2 mb-2">
        <div class="col-6 col-sm-6 col-md-3">
          <section class="morado rounded p-1 h-100">
            <div class="tarjeta-morada w-100 h-100">Mora</div>
          </section>
        </div>
        <div class="col-6 col-sm-6 col-md-3">
          <section class="morado rounded p-1 h-100">
            <div class="tarjeta-morada w-100 h-100">Uva</div>
          </section>
        </div>
        <div class="col-6 col-sm-6 col-md-3">
          <section class="morado rounded p-1 h-100">
            <div class="tarjeta-morada w-100 h-100">Nranja</div>
          </section>
        </div>
        <div class="col-6 col-sm-6 col-md-3">
          <section class="morado rounded p-1 h-100">
            <div class="tarjeta-morada w-100 h-100">Pepino</div>
          </section>
        </div>
      </div>
   
      <div class="row g-2">
        <div class="col-6 col-sm-6 col-md-3">
          <section class="morado rounded p-1 h-100">
            <div class="tarjeta-morada w-100 h-100">Piña</div>
          </section>
        </div>
        <div class="col-6 col-sm-6 col-md-3">
          <section class="morado rounded p-1 h-100">
            <div class="tarjeta-morada w-100 h-100">Melon</div>
          </section>
        </div>
        <div class="col-6 col-sm-6 col-md-3">
          <section class="morado rounded p-1 h-100">
            <div class="tarjeta-morada w-100 h-100">Sandia</div>
          </section>
        </div>
        <div class="col-6 col-sm-6 col-md-3">
          <section class="morado rounded p-1 h-100">
            <div class="tarjeta-morada w-100 h-100">Papaya</div>
          </section>
        </div>
      </div>
    </div>

  </div>

  
  <div class="row g-2 mb-4">
    <div class="col-12">
      <footer id="rosado" class="d-flex align-items-center justify-content-center rounded">
        <span class="fw-bold text-dark">Espacio para el Footer</span>
      </footer>
    </div>
  </div>


</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>
</body>
</html>
